<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <link rel="stylesheet" href="backtracking.css" />
    <title>Backtracking</title>
  </head>
  <body>
    <div class="text-center mt-5">
      <a href="index.html">Sorting</a><br />
      <p class="badge bg-dark fw-light fs-5 rounded-1" id="message">
        Backtracking-Rat in a Maze
      </p>
    </div>

    <div class="container-fluid d-flex justify-content-center p-2">
      <span id="prev"
        ><i class="fa fa-chevron-left" onclick="return changePattern(-1)"></i
      ></span>
      <span id="my-board"></span>
      <span id="next"
        ><i class="fa fa-chevron-right" onclick="return changePattern(1)"></i
      ></span>
    </div>

    <div class="container-fluid d-flex justify-content-center mb-2">
      <span id="indicators"></span>
    </div>
    <div class="container-fluid d-flex justify-content-center">
      <button
        class="btn btn-danger btn-sm rounded-1 me-1"
        onclick="return reset()"
      >
        Reset
      </button>
      <button class="btn btn-success btn-sm rounded-1" onclick="return solve()">
        Solve
      </button>
    </div>

    <script src="backtracking.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
