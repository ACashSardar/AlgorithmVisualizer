<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Algo View</title>
  </head>
  <body>
    <nav
      class="container-fluid p-3 bg-dark text-light fw-light fs-4 text-center shadow"
    >
      ALGORITHM VISUALIZER
    </nav>
    <audio
      id="audio"
      src="media/mixkit-retro-game-notification-212-[AudioTrimmer.com].wav"
    ></audio>
    <div class="container-fluid d-flex justify-content-center">
      <div>
        <div class="card my-2">
          <div class="card-body">Animation Speed</div>
        </div>
        <div class="card" style="height: 25rem">
          <div class="heading p-3 mb-0">
            <h4>LET'S SORT</h4>
            <form onsubmit="return handleSubmit(event)" class="mb-2">
              <input
                type="text"
                id="inputs"
                name="elements"
                value=""
                placeholder="Enter some random space separated integers"
                class="form-control mb-2"
                required
              />
              <div class="d-flex">
                <select
                  class="form-select me-1"
                  name=""
                  id=""
                  style="width: 28%"
                  onchange="return handleSortAlgo(event)"
                >
                  <option value="bubbleSort">Bubble Sort</option>
                  <option value="mergeSort">Merge Sort</option>
                  <option value="quickSort">Quick Sort</option>
                </select>
                <button
                  class="btn btn-primary btn-sm me-1"
                  type="submit"
                  style="width: 24%"
                >
                  Load
                </button>
                <button
                  class="btn btn-danger btn-sm me-1"
                  onclick="return clearInput()"
                  style="width: 24%"
                >
                  Clear
                </button>
                <button
                  class="btn btn-success btn-sm"
                  onclick="return handleSort()"
                  style="width: 24%"
                >
                  Sort
                </button>
              </div>
            </form>
            <div class="bg-light p-2 rounded mb-0">
              <label id="complexity" class="text-dark"
                >Time Complexity: 0[n^2]</label
              >
            </div>
          </div>
          <div class="card-body bg-light border border-top">
            <ul id="bar-list" class="d-flex justify-content-center"></ul>
          </div>
        </div>
        <div class="card mt-1 mb-5">
          <div class="card-body px-3">
            <h3>Actions</h3>
          </div>
          <div
            class="overflow-auto p-3 pb-3 bg-dark border"
            style="height: 10rem"
          >
            <p id="logs" class="fs-6 fw-bold"></p>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="main.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"
  ></script>
</html>
