<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="styles.css" />
    <title>Algo View</title>
  </head>
  <body>
    <audio
      id="audio"
      src="media/mixkit-retro-game-notification-212-[AudioTrimmer.com].wav"
    ></audio>
    <audio
      id="audio2"
      src="media/mixkit-video-game-retro-click-237.wav"
    ></audio>

    <nav class="container-fluid bg-dark p-3 d-flex justify-content-center">
      <a href="index.html" class="link-warning fs-5 text-decoration-none me-3"
        >Sorting</a
      >
      <a href="backtracking.html" class="link-light fs-5 text-decoration-none"
        >Backtracking</a
      >
    </nav>
    <div class="container-fluid d-flex justify-content-center">
      <div>
        <div class="text-center">
          <label class="custom-text mt-5">SORTING VISUALIZER</label>
        </div>
        <div class="card my-2 rounded-0">
          <div class="card-body">
            <h6 class="custom-text">Animation delay</h6>
            <div class="d-flex justify-content-between custom-text">
              <label>1ms</label>
              <label>100ms</label>
              <label>200ms</label>
              <label>300ms</label>
              <label>400ms</label>
              <label>500ms</label>
            </div>
            <input
              type="range"
              class="form-range me-5"
              id="customRange1"
              name="animationSpeed"
              min="0"
              max="10"
              step="2"
              value="0"
              onchange="return adjustAnimation(event)"
            />
            <hr class="text-light" />
            <h6 class="custom-text">Number of Samples</h6>
            <div class="d-flex justify-content-between custom-text">
              <label>50</label>
              <label>100</label>
              <label>150</label>
              <label>200</label>
              <label>250</label>
              <label>300</label>
            </div>
            <input
              type="range"
              class="form-range me-5"
              id="customRange1"
              name="bar-width"
              min="50"
              max="300"
              step="50"
              value="50"
              onchange="return adjustBarWidth(event)"
            />
          </div>
        </div>

        <div class="card mb-2 rounded-0" style="height: 25rem">
          <div class="p-3 mb-0">
            <div class="d-flex justify-content-between">
              <select
                class="form-select me-1 rounded-0"
                name=""
                id=""
                style="width: 44%"
                onchange="return handleSortAlgo(event)"
              >
                <option value="bubbleSort">Bubble Sort</option>
                <option value="mergeSort">Merge Sort</option>
                <option value="selectionSort">Selection Sort</option>
                <option value="quickSort">Quick Sort</option>
              </select>

              <button
                class="custom-btn me-1"
                type="submit"
                style="width: 28%"
                onclick="return loadRandomSamples()"
              >
                Shuffle
              </button>
              <button
                class="custom-btn"
                onclick="return handleSort()"
                style="width: 28%"
              >
                Sort
              </button>
            </div>

            <div class="p-2 mb-0 d-flex justify-content-between">
              <label id="complexity" class="fs-6 custom-text">TC: 0[n²]</label>
              <label id="array-size" class="fs-6 custom-text">Array Size</label>
              <label id="runtime" class="fs-6 custom-text">Stopped</label>
            </div>
          </div>
          <div class="card-body border-0 border-top custom-bg">
            <ul id="bar-list"></ul>
          </div>
        </div>

        <div class="card mb-2 rounded-0">
          <div class="card-body p-3 d-flex justify-content-between rounded">
            <p class="fs-6 mb-0 mt-2 custom-text">View Logs</p>
            <span>
              <button class="custom-btn2" onclick="return reset()">
                Reset
              </button>
              <button class="custom-btn" onclick="return clearConsole()">
                Clear console
              </button>
            </span>
          </div>
          <div
            class="overflow-auto p-3 pb-3 border-0 custom-bg"
            style="height: 10rem"
          >
            <p id="logs" class="fs-6"></p>
          </div>
        </div>
      </div>
    </div>
    <footer class="pt-3 pb-2 text-center">
      <p>Developed By Akash Sardar ✌🏻</p>
    </footer>
  </body>
  <script src="main.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"
  ></script>
</html>
